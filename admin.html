<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산방산 농수산 — 주문 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5efe6;color:#2d1a00;max-width:1360px;margin:0 auto;padding-bottom:88px;}
.top{background:#2d1a00;color:#fff;padding:14px 18px;position:sticky;top:0;z-index:50;}
.top h1{font-size:17px;font-weight:700;}
.top .sub{font-size:11px;color:#c8a878;margin-top:2px;}
.tabs{display:flex;gap:6px;padding:10px 14px 4px;background:#fff;border-bottom:1px solid #e8ddc8;position:sticky;top:50px;z-index:40;flex-wrap:wrap;}
.tab{padding:7px 13px;border:1px solid #e0c9a0;border-radius:20px;background:#fff;font-size:13px;font-weight:600;color:#7a5a35;cursor:pointer;}
.tab.active{background:#e8581a;color:#fff;border-color:#e8581a;}
.tab .cnt{font-size:11px;opacity:.85;margin-left:3px;}
.controls{display:flex;gap:8px;padding:10px 14px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e8ddc8;}
.search{flex:1;min-width:180px;padding:9px 12px;border:1px solid #e0c9a0;border-radius:8px;font-size:14px;outline:none;}
.search:focus{border-color:#e8581a;}
.ctl-sel{padding:8px 10px;border:1px solid #e0c9a0;border-radius:8px;font-size:13px;background:#fff;cursor:pointer;}
.btn{padding:8px 12px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-ghost{background:#fff;border:1px solid #e0c9a0;color:#5a3e20;}
.btn-dark{background:#2d1a00;color:#fff;}
.btn-mkt{background:#1565c0;color:#fff;}
.bar2{display:flex;gap:8px;padding:8px 14px;flex-wrap:wrap;align-items:center;font-size:12px;color:#7a5a35;}
.period-totals{display:flex;gap:8px;padding:10px 14px 2px;flex-wrap:wrap;}
.pt-card{background:#fff;border:1px solid #e0c9a0;border-radius:10px;padding:8px 14px;font-size:13px;color:#5a3e20;}
.pt-card b{color:#7a5a35;font-weight:700;margin-right:6px;}
.pt-card span,.pt-card{white-space:nowrap;}
.pt-card .c-total,.pt-card strong{color:#e8581a;}
.pt-card i{color:#9a7a50;font-style:normal;font-size:11px;}
.tablewrap{overflow-x:auto;padding:0 2px;}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:10px;overflow:hidden;min-width:960px;}
thead th{background:#fbf4ea;color:#7a5a35;font-weight:700;font-size:11px;text-align:left;padding:6px 5px;border-bottom:2px solid #e8ddc8;white-space:nowrap;position:sticky;top:0;}
tbody td{padding:6px 5px;border-bottom:1px solid #f0e8da;color:#3f2c14;vertical-align:top;}
tbody tr:hover{background:#fffaf2;}
.c-id{font-weight:800;color:#e8581a;white-space:nowrap;}
.c-time{color:#9a7a50;white-space:nowrap;font-size:12px;}
.c-total{font-weight:800;color:#e8581a;white-space:nowrap;text-align:right;}
.c-addr{max-width:200px;}
.c-items{max-width:160px;color:#5a3e20;font-size:11px;line-height:1.45;}
.chk{width:16px;height:16px;accent-color:#e8581a;}
.mini{background:#2d1a00;color:#fff;border:none;border-radius:4px;padding:1px 5px;font-size:10px;cursor:pointer;margin-left:3px;}
.del{background:#fdecea;color:#c0392b;border:1px solid #f5c6c2;border-radius:4px;padding:0 5px;font-size:11px;line-height:1.5;cursor:pointer;margin-left:5px;}
.del:hover{background:#f8d7d4;}
.status-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.s-신규{background:#fff3e0;color:#a05c10;}
.s-입금확인{background:#e3f2fd;color:#1565c0;}
.s-발송완료{background:#e8f5e9;color:#2e7d32;}
.mkt-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.mkt-o{background:#e3f2fd;color:#1565c0;}
.mkt-x{background:#eee;color:#999;}
.batch-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#ede7f6;color:#5e35b1;}
.batch-toggle{background:#5e35b1;color:#fff;border:none;border-radius:5px;width:20px;height:20px;font-size:10px;cursor:pointer;margin-right:4px;vertical-align:middle;}
.batch-parent td{background:#faf7ff;}
.batch-child td{background:#fcfbff;}
.batch-child .c-id{font-weight:600;}
.status-sel{padding:6px 8px;border:1px solid #e0c9a0;border-radius:7px;font-size:13px;font-weight:700;color:#2d1a00;background:#fffbf6;cursor:pointer;}
.pay-done{background:#e3f2fd;color:#1565c0;border-color:#90caf9;}
.pay-wait{background:#fff;color:#9a7a50;}
.ship-done{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;}
.ship-wait{background:#fff;color:#9a7a50;}
.pager{display:flex;gap:6px;align-items:center;justify-content:center;padding:14px;flex-wrap:wrap;}
.pager button{min-width:34px;height:34px;border:1px solid #e0c9a0;background:#fff;border-radius:8px;font-size:13px;font-weight:700;color:#5a3e20;cursor:pointer;}
.pager button.active{background:#e8581a;color:#fff;border-color:#e8581a;}
.pager button:disabled{opacity:.4;cursor:not-allowed;}
.empty{text-align:center;color:#9a7a50;padding:40px 0;font-size:14px;}
.loading{text-align:center;color:#9a7a50;padding:40px 0;}
.sticky-foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #e8ddc8;padding:10px 14px;display:flex;gap:8px;max-width:1180px;margin:0 auto;z-index:60;align-items:center;}
.sticky-foot .sel-info{font-size:12px;color:#7a5a35;font-weight:700;white-space:nowrap;}
.sticky-foot .btn{flex:1;}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#2d1a00;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;max-width:90%;text-align:center;}
.toast.show{opacity:.95;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;border-radius:12px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;}
.modal-box h3{font-size:15px;margin-bottom:10px;}
.modal-box textarea{width:100%;height:240px;font-size:12px;font-family:monospace;border:1px solid #e0c9a0;border-radius:8px;padding:10px;resize:vertical;}
.modal-foot{display:flex;gap:8px;margin-top:12px;}
.modal-foot .btn{flex:1;}
</style>
</head>
<body>
<div class="top">
  <h1>산방산 농수산 — 주문 관리</h1>
  <div class="sub">관리자 전용 · 비밀번호 보호 영역</div>
</div>

<div class="tabs" id="tabs">
  <div class="tab" data-st="신규" onclick="setTab(this)">신규<span class="cnt" id="c-신규"></span></div>
  <div class="tab" data-st="입금확인" onclick="setTab(this)">입금확인<span class="cnt" id="c-입금확인"></span></div>
  <div class="tab" data-st="발송완료" onclick="setTab(this)">발송완료<span class="cnt" id="c-발송완료"></span></div>
  <div class="tab active" data-st="전체" onclick="setTab(this)">전체<span class="cnt" id="c-전체"></span></div>
</div>

<div class="controls">
  <input class="search" id="search" type="text" placeholder="받는분·연락처·주소·입금자 검색" oninput="onSearch()">
  <select class="ctl-sel" id="pagesize" onchange="onPageSize()">
    <option value="20">20개씩</option>
    <option value="50">50개씩</option>
    <option value="100">100개씩</option>
  </select>
  <button class="btn btn-ghost" onclick="loadOrders()">새로고침</button>
</div>

<div class="period-totals" id="period-totals"></div>

<div class="bar2">
  <button class="btn btn-ghost" onclick="selectAllFiltered()">검색결과 전체선택</button>
  <button class="btn btn-ghost" onclick="clearSel()">선택해제</button>
  <button class="btn btn-mkt" onclick="extractMarketing()">마케팅 동의자 추출</button>
  <span id="result-info"></span>
</div>

<div class="tablewrap" id="tablewrap"><div class="loading">불러오는 중…</div></div>
<div class="pager" id="pager"></div>

<div class="sticky-foot">
  <span class="sel-info" id="sel-info">선택 0건</span>
  <button class="btn btn-dark" onclick="smsSelected()">사장님께 문자전송</button>
  <button class="btn btn-ghost" onclick="copySelected()">문자 복사</button>
</div>

<div class="modal-bg" id="m-text">
  <div class="modal-box">
    <h3 id="m-text-title">문자 내용</h3>
    <textarea id="m-text-area" readonly></textarea>
    <div class="modal-foot">
      <button class="btn btn-dark" onclick="copyTextArea()">복사</button>
      <button class="btn btn-ghost" onclick="closeModal('m-text')">닫기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="gate">
  <div class="modal-box" style="max-width:340px;">
    <h3>관리자 비밀번호</h3>
    <p id="gate-msg" style="font-size:12px;color:#c0392b;min-height:16px;margin-bottom:8px;"></p>
    <input id="gate-input" type="password" autocomplete="current-password"
      style="width:100%;padding:11px 12px;border:1px solid #e0c9a0;border-radius:8px;font-size:15px;outline:none;"
      placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter'){submitGate();}">
    <div class="modal-foot">
      <button class="btn btn-dark" onclick="submitGate()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== 설정 ===== */
var CONFIG = {
  API_BASE: "/api/admin",
  OWNER_PHONE: "010-6323-8851"
};

/* ===== 관리자 비밀번호 (브라우저에 기억) ===== */
var ADMINKEY = (window.localStorage ? (localStorage.getItem("sb_admin_key")||"") : "");
function setKey(k){ ADMINKEY=k; try{ localStorage.setItem("sb_admin_key", k); }catch(e){} }
function clearKey(){ ADMINKEY=""; try{ localStorage.removeItem("sb_admin_key"); }catch(e){} }
function adminFetch(url, opts){
  opts = opts || {}; opts.headers = opts.headers || {};
  opts.headers["X-Admin-Key"] = ADMINKEY;
  if(!opts.headers["accept"]) opts.headers["accept"] = "application/json";
  return fetch(url, opts);
}
function showGate(msg){ document.getElementById("gate-msg").textContent = msg||""; document.getElementById("gate").classList.add("show"); setTimeout(function(){document.getElementById("gate-input").focus();},50); }
function hideGate(){ document.getElementById("gate").classList.remove("show"); }
function submitGate(){ var v=document.getElementById("gate-input").value; if(!v) return; setKey(v); document.getElementById("gate-input").value=""; hideGate(); loadOrders(); }
function startAdmin(){ if(!ADMINKEY){ showGate(""); return; } loadOrders(); }

var allOrders = [];   // 전체 주문(모든 상태) — 탭/검색은 클라이언트에서 처리
var curTab = "전체";
var search = "";
var pageSize = 20;
var page = 1;
var selected = new Set();
var openBatches = new Set();   // 펼쳐진 묶음 batch_id

function won(n){ return Number(n).toLocaleString("ko-KR") + "원"; }
function kstDate(s){
  if(!s) return "";
  var iso = s.indexOf("T")>=0 ? s : s.replace(" ","T");
  if(iso.indexOf("Z")<0 && iso.indexOf("+")<0) iso += "Z";
  var d = new Date(iso);
  if(isNaN(d.getTime())) return (s||"").slice(0,10);
  var k = new Date(d.getTime()+9*3600*1000);
  var p=function(n){return (n<10?"0":"")+n;};
  return k.getUTCFullYear()+"-"+p(k.getUTCMonth()+1)+"-"+p(k.getUTCDate());
}
function esc(s){ return (s||"").replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
function jsstr(s){ return (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," "); }
function toast(msg){ var el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(window.__t); window.__t=setTimeout(function(){el.classList.remove("show");},1800); }

function setTab(el){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  el.classList.add("active");
  curTab = el.getAttribute("data-st");
  selected.clear(); page=1;
  renderTable();
}
function onSearch(){ search = document.getElementById("search").value.trim().toLowerCase(); page=1; renderTable(); }
function onPageSize(){ pageSize = parseInt(document.getElementById("pagesize").value,10)||20; page=1; renderTable(); }

function loadOrders(){
  document.getElementById("tablewrap").innerHTML = '<div class="loading">불러오는 중…</div>';
  document.getElementById("pager").innerHTML = "";
  adminFetch(CONFIG.API_BASE + "/orders?limit=500")
    .then(function(r){ if(r.status===401){ clearKey(); showGate("비밀번호가 올바르지 않습니다. 다시 입력해 주세요."); throw new Error("__gate__"); } return r.json(); })
    .then(function(res){ if(!res.ok){ throw new Error(res.error || "조회 실패"); } allOrders = res.orders || []; updateCounts(); renderTable(); })
    .catch(function(e){ if(e.message==="__gate__") return; document.getElementById("tablewrap").innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; });
}

/* 탭 뱃지 카운트 — 묶음 단위, 검색 무시(전체 기준) */
function updateCounts(){
  var units = buildUnits(allOrders);
  var c={ "신규":0,"입금확인":0,"발송완료":0,"전체":units.length };
  units.forEach(function(u){
    ["신규","입금확인","발송완료"].forEach(function(st){
      if(u.orders.some(function(o){return o.status===st;})) c[st]++;
    });
  });
  ["신규","입금확인","발송완료","전체"].forEach(function(k){ var el=document.getElementById("c-"+k); if(el) el.textContent = "("+c[k]+")"; });
  renderPeriodTotals();
}

function filteredOrders(){
  if(!search) return allOrders;
  return allOrders.filter(function(o){
    var hay = (o.name+" "+o.phone+" "+(o.address||"")+" "+(o.address_detail||"")+" "+(o.depositor_name||"")+" #"+o.id).toLowerCase();
    return hay.indexOf(search) !== -1;
  });
}

function itemsSummary(o){
  var items=[]; try{ items=JSON.parse(o.items_json); }catch(e){}
  return items.map(function(it){ return esc(it.name)+" "+esc(it.weight)+"×"+it.qty; }).join(", ");
}

/* 묶음(batch) 단위로 그룹화 — 단건은 그대로, 같은 batch_id는 하나로 묶음 */
function buildUnits(list){
  var seen={}, units=[];
  list.forEach(function(o){
    if(o.batch_id){
      if(seen[o.batch_id]){ seen[o.batch_id].orders.push(o); return; }
      var u={type:"batch", batch_id:o.batch_id, orders:[o]};
      seen[o.batch_id]=u; units.push(u);
    } else {
      units.push({type:"single", orders:[o]});
    }
  });
  return units;
}

/* 단건(또는 묶음 자식) 한 줄 */
function singleRow(o, childBid){
  var t = (o.created_at||"").replace("T"," ").replace("Z","");
  if(t.length>=16) t = t.slice(5,16);
  var mkt = o.agree_marketing==1 ? '<span class="mkt-badge mkt-o">O</span>' : '<span class="mkt-badge mkt-x">X</span>';
  var addrFull = (o.zipcode?"("+o.zipcode+") ":"")+(o.address||"")+" "+(o.address_detail||"");
  var items = itemsSummary(o);
  var trAttr = childBid ? (' data-br="'+childBid+'" class="batch-child"'+(openBatches.has(childBid)?"":' style="display:none"')) : "";
  var delBtn = '<button class="del" onclick="deleteOrder('+o.id+')" title="주문 삭제">✕</button>';
  var idCell = childBid ? '<td class="c-id">↳ #'+o.id+delBtn+'</td>' : '<td class="c-id">#'+o.id+delBtn+'</td>';
  var chkHandler = childBid ? "toggleSelSync" : "toggleSel";
  return '<tr'+trAttr+'>'
    +'<td><input class="chk" type="checkbox" '+(selected.has(o.id)?"checked":"")+' onchange="'+chkHandler+'('+o.id+',this)"></td>'
    +idCell
    +'<td class="c-time">'+esc(t)+'</td>'
    +'<td>'+esc(o.name)+'</td>'
    +'<td>'+esc(o.phone)+'<button class="mini" onclick="copyText(\''+jsstr(o.phone)+'\')">복사</button></td>'
    +'<td class="c-addr" title="'+esc(addrFull)+'">'+esc(addrFull)+'<button class="mini" onclick="copyText(\''+jsstr(addrFull)+'\')">복사</button></td>'
    +'<td class="c-items" title="'+esc(items)+'">'+items+'</td>'
    +'<td class="c-total">'+won(o.total_amount)+'</td>'
    +paySelCell(o)
    +'<td>'+esc(o.depositor_name)+'</td>'
    +'<td>'+mkt+'</td>'
    +shipSelCell(o)
    +'</tr>';
}

/* 입금 열(대기/완료) — status 입금확인·발송완료면 완료 */
function paySelCell(o){
  var done = (o.status==="입금확인" || o.status==="발송완료");
  return '<td><select class="status-sel '+(done?"pay-done":"pay-wait")+'" onchange="setPay('+o.id+',this.value)">'
    +'<option value="대기"'+(!done?" selected":"")+'>대기</option>'
    +'<option value="완료"'+(done?" selected":"")+'>완료</option>'
    +'</select></td>';
}
/* 발송 열(대기/완료) — status 발송완료면 완료 */
function shipSelCell(o){
  var done = (o.status==="발송완료");
  return '<td><select class="status-sel '+(done?"ship-done":"ship-wait")+'" onchange="setShip('+o.id+',this.value)">'
    +'<option value="대기"'+(!done?" selected":"")+'>대기</option>'
    +'<option value="완료"'+(done?" selected":"")+'>완료</option>'
    +'</select></td>';
}

/* 묶음 부모 줄 + 자식 줄들 */
function batchRows(u){
  var bid = u.batch_id, orders = u.orders;
  var ids = orders.map(function(o){return o.id;});
  window.__batchIds[bid] = ids;
  var sum = orders.reduce(function(a,o){return a+Number(o.total_amount||0);},0);
  var dep = orders[0].depositor_name;
  var phone = orders[0].phone;
  var dnames=[]; orders.forEach(function(o){ if(dnames.indexOf(o.name)===-1) dnames.push(o.name); });
  var t = (orders[0].created_at||"").replace("T"," ").replace("Z","");
  if(t.length>=16) t = t.slice(5,16);
  var open = openBatches.has(bid);
  var allSel = ids.every(function(id){return selected.has(id);});
  var anyMkt = orders.some(function(o){return o.agree_marketing==1;});
  var mkt = anyMkt ? '<span class="mkt-badge mkt-o">O</span>' : '<span class="mkt-badge mkt-x">X</span>';
  var parent = '<tr class="batch-parent">'
    +'<td><input class="chk" type="checkbox" id="bchk-'+bid+'" '+(allSel?"checked":"")+' onchange="toggleBatchSel(\''+bid+'\',this)"></td>'
    +'<td class="c-id"><button class="batch-toggle" onclick="toggleBatch(\''+bid+'\')">'+(open?"▼":"▶")+'</button>#'+orders[0].id+' <span class="batch-badge">묶음 '+orders.length+'곳</span><button class="del" onclick="deleteBatch(\''+bid+'\')" title="묶음 전체 삭제">✕</button></td>'
    +'<td class="c-time">'+esc(t)+'</td>'
    +'<td>'+esc(dnames.join(", "))+'</td>'
    +'<td>'+esc(phone)+'</td>'
    +'<td class="c-addr" style="color:#9a7a50">여러 배송지 '+orders.length+'곳 (펼쳐보기)</td>'
    +'<td class="c-items" style="color:#9a7a50">↓ 펼쳐서 확인</td>'
    +'<td class="c-total">'+won(sum)+'</td>'
    +'<td style="color:#9a7a50;font-size:12px;">개별</td>'
    +'<td>'+esc(dep)+'</td>'
    +'<td>'+mkt+'</td>'
    +'<td style="color:#9a7a50;font-size:12px;">개별</td>'
    +'</tr>';
  var children = orders.map(function(o){ return singleRow(o, bid); }).join("");
  return parent + children;
}

function toggleBatch(bid){
  if(openBatches.has(bid)) openBatches.delete(bid); else openBatches.add(bid);
  renderTable();
}
function toggleBatchSel(bid, cb){
  var ids = (window.__batchIds||{})[bid] || [];
  ids.forEach(function(id){ if(cb.checked) selected.add(id); else selected.delete(id); });
  renderTable();
}
function toggleSelSync(id, cb){ if(cb.checked) selected.add(id); else selected.delete(id); renderTable(); }

function renderTable(){
  window.__batchIds = {};
  var list = filteredOrders();
  var units = buildUnits(list);
  // 탭 필터(묶음 단위): 하위 주문 중 하나라도 해당 상태면 그 묶음 전체를 표시
  if(curTab !== "전체"){
    units = units.filter(function(u){ return u.orders.some(function(o){return o.status===curTab;}); });
  }
  var total = units.length;
  var pages = Math.max(1, Math.ceil(total / pageSize));
  if(page > pages) page = pages;
  var start = (page-1)*pageSize;
  var pageUnits = units.slice(start, start+pageSize);

  renderPeriodTotals();

  var wrap = document.getElementById("tablewrap");
  if(total===0){ wrap.innerHTML='<div class="empty">주문이 없습니다.</div>'; document.getElementById("pager").innerHTML=""; document.getElementById("result-info").textContent=""; updateSelInfo(); return; }

  var rows = pageUnits.map(function(u){
    return u.orders.length>1 ? batchRows(u) : singleRow(u.orders[0]);
  }).join("");

  wrap.innerHTML = '<table><thead><tr>'
    +'<th></th><th>주문#</th><th>시각</th><th>받는분</th><th>연락처</th><th>주소</th><th>품목</th><th>합계</th><th>입금</th><th>입금자</th><th>광고</th><th>발송</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>';

  // 묶음 부모 체크박스 indeterminate 처리
  Object.keys(window.__batchIds).forEach(function(bid){
    var cb=document.getElementById("bchk-"+bid); if(!cb) return;
    var bids=window.__batchIds[bid];
    var all=bids.every(function(id){return selected.has(id);});
    var some=bids.some(function(id){return selected.has(id);});
    cb.indeterminate = some && !all;
  });

  var orderCnt = units.reduce(function(a,u){return a+u.orders.length;},0);
  document.getElementById("result-info").textContent = total+"건(묶음 포함, 실주문 "+orderCnt+"건) 중 "+(start+1)+"–"+Math.min(start+pageSize,total)+" 표시" + (search?" (검색)":"");
  renderPager(pages);
  updateSelInfo();
}

/* 일/주/월 합계금액 — 현재 탭에 로드된 주문(allOrders) 기준 */
function renderPeriodTotals(){
  var el = document.getElementById("period-totals");
  if(!el) return;
  var src = allOrders;
  var now = new Date();
  var pad=function(n){return (n<10?"0":"")+n;};
  var todayStr = now.getFullYear()+"-"+pad(now.getMonth()+1)+"-"+pad(now.getDate());
  var monStr = now.getFullYear()+"-"+pad(now.getMonth()+1);
  // 이번 주 월요일
  var wd = (now.getDay()+6)%7; // 월=0
  var mon = new Date(now.getFullYear(), now.getMonth(), now.getDate()-wd);
  var weekStart = mon.getFullYear()+"-"+pad(mon.getMonth()+1)+"-"+pad(mon.getDate());
  var dSum=0, wSum=0, mSum=0, dCnt=0, wCnt=0, mCnt=0;
  src.forEach(function(o){
    var dt=kstDate(o.created_at); // YYYY-MM-DD (KST 변환)
    var amt=Number(o.total_amount||0);
    if(dt===todayStr){ dSum+=amt; dCnt++; }
    if(dt>=weekStart){ wSum+=amt; wCnt++; }
    if(dt.slice(0,7)===monStr){ mSum+=amt; mCnt++; }
  });
  el.innerHTML =
     '<span class="pt-card"><b>오늘</b> <strong>'+won(dSum)+'</strong> <i>('+dCnt+'건)</i></span>'
    +'<span class="pt-card"><b>이번 주</b> <strong>'+won(wSum)+'</strong> <i>('+wCnt+'건)</i></span>'
    +'<span class="pt-card"><b>이번 달</b> <strong>'+won(mSum)+'</strong> <i>('+mCnt+'건)</i></span>';
}

function renderPager(pages){
  var el = document.getElementById("pager");
  if(pages<=1){ el.innerHTML=""; return; }
  var html = '<button onclick="goPage(1)" '+(page===1?"disabled":"")+'>«</button>'
           + '<button onclick="goPage('+(page-1)+')" '+(page===1?"disabled":"")+'>‹</button>';
  var s=Math.max(1,page-2), e=Math.min(pages,page+2);
  for(var i=s;i<=e;i++){ html+='<button class="'+(i===page?"active":"")+'" onclick="goPage('+i+')">'+i+'</button>'; }
  html += '<button onclick="goPage('+(page+1)+')" '+(page===pages?"disabled":"")+'>›</button>'
        + '<button onclick="goPage('+pages+')" '+(page===pages?"disabled":"")+'>»</button>';
  el.innerHTML = html;
}
function goPage(p){ page=p; renderTable(); window.scrollTo({top:0,behavior:"smooth"}); }

function toggleSel(id, cb){ if(cb.checked) selected.add(id); else selected.delete(id); updateSelInfo(); }
function selectAllFiltered(){ filteredOrders().forEach(function(o){ selected.add(o.id); }); renderTable(); toast("검색결과 "+filteredOrders().length+"건 선택"); }
function clearSel(){ selected.clear(); renderTable(); }
function updateSelInfo(){ document.getElementById("sel-info").textContent = "선택 "+selected.size+"건"; }

/* 입금/발송 토글 → 단일 status로 매핑 */
function findOrder(id){
  var a=allOrders||[]; for(var i=0;i<a.length;i++){ if(a[i].id===id) return a[i]; }
  var f=window.__fullOrders||[]; for(var j=0;j<f.length;j++){ if(f[j].id===id) return f[j]; }
  return null;
}
function setPay(id, v){
  var o=findOrder(id); var cur=o?o.status:"신규";
  var ns = (v==="완료") ? (cur==="발송완료"?"발송완료":"입금확인") : "신규";
  setStatus(id, ns);
}
function setShip(id, v){
  var ns = (v==="완료") ? "발송완료" : "입금확인";
  setStatus(id, ns);
}

/* 주문 취소(삭제) */
function deleteOrder(id){
  if(!confirm("주문 #"+id+" 을(를) 삭제할까요? 되돌릴 수 없습니다.")) return;
  adminFetch(CONFIG.API_BASE + "/orders/" + id, { method:"DELETE" })
    .then(function(r){return r.json();}).then(function(res){
      if(res.ok){ toast("#"+id+" 삭제됨"); loadOrders(); } else { toast(res.error || "삭제 실패"); }
    }).catch(function(){ toast("네트워크 오류"); });
}
function deleteBatch(bid){
  var ids = (window.__batchIds||{})[bid] || [];
  if(ids.length===0) return;
  if(!confirm("이 묶음 "+ids.length+"건을 모두 삭제할까요? 되돌릴 수 없습니다.")) return;
  Promise.all(ids.map(function(id){
    return adminFetch(CONFIG.API_BASE + "/orders/" + id, { method:"DELETE" }).then(function(r){return r.json();});
  })).then(function(){ toast("묶음 "+ids.length+"건 삭제됨"); loadOrders(); })
     .catch(function(){ toast("삭제 중 오류"); loadOrders(); });
}

/* 상태 변경 */
function setStatus(id, status){
  adminFetch(CONFIG.API_BASE + "/orders/" + id, { method:"PATCH", headers:{"content-type":"application/json"}, body:JSON.stringify({status:status}) })
    .then(function(r){return r.json();}).then(function(res){
      if(res.ok){ toast("#"+id+" → "+status); loadOrders(); } else { toast(res.error || "변경 실패"); }
    }).catch(function(){ toast("네트워크 오류"); });
}

/* 선택 주문 → 사장님 문자 */
function buildSmsText(){
  var picked = allOrders.filter(function(o){return selected.has(o.id);});
  if(picked.length===0){ return null; }
  return picked.map(function(o){
    var items=[]; try{items=JSON.parse(o.items_json);}catch(e){}
    var first = items[0] ? (items[0].name+" "+items[0].weight+" x"+items[0].qty) : "";
    var more = items.length>1 ? " 외 "+(items.length-1)+"건" : "";
    return "[산방산 주문 #"+o.id+"]\n"+o.name+" / "+o.phone+"\n"+(o.address||"")+" "+(o.address_detail||"")+"\n"
      +first+more+" 합계 "+Number(o.total_amount).toLocaleString("ko-KR")+"원\n입금자: "+o.depositor_name;
  }).join("\n\n");
}
function smsSelected(){
  var text = buildSmsText(); if(!text){ toast("선택된 주문이 없습니다."); return; }
  var phone = CONFIG.OWNER_PHONE.replace(/[^0-9]/g,"");
  // TODO(2단계): 솔라피 자동발송으로 전환 — fetch("/api/notify",...)
  window.location.href = "sms:" + phone + "?body=" + encodeURIComponent(text);
  setTimeout(function(){ openTextModal("선택 주문 문자내용 (수동 복사용)", text); }, 600);
}
function copySelected(){ var text = buildSmsText(); if(!text){ toast("선택된 주문이 없습니다."); return; } openTextModal("선택 주문 문자내용", text); }

/* 마케팅 동의자 추출 (전체 기준) */
function extractMarketing(){
  var seen={}, lines=[];
  allOrders.forEach(function(o){ if(o.agree_marketing==1 && !seen[o.phone]){ seen[o.phone]=1; lines.push(o.name+" "+o.phone); } });
  if(lines.length===0){ toast("마케팅 동의자가 없습니다."); return; }
  openTextModal("마케팅 수신 동의자 ("+lines.length+"명)", lines.join("\n"));
}

function openTextModal(title, text){ document.getElementById("m-text-title").textContent=title; document.getElementById("m-text-area").value=text; document.getElementById("m-text").classList.add("show"); }
function copyTextArea(){ copyText(document.getElementById("m-text-area").value); }
function closeModal(id){ document.getElementById(id).classList.remove("show"); }
function copyText(t){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){toast("복사됨");},function(){fb(t);}); } else { fb(t); } }
function fb(t){ var ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");toast("복사됨");}catch(e){toast("복사 실패");} document.body.removeChild(ta); }

startAdmin();
</script>
